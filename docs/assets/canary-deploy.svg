<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Canary deploy 10 50 100">
  <defs>
    <style>
      .title { font: 700 32px Verdana, sans-serif; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .step { font: 700 24px Verdana, sans-serif; fill: #0f172a; }
      .desc { font: 17px Verdana, sans-serif; fill: #334155; }
      .arrow { stroke: #16a34a; stroke-width: 3; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="420" fill="#f1f5f9"/>
  <text x="50" y="56" class="title">Canary rollout strategy</text>

  <rect x="70" y="100" width="300" height="220" class="box"/>
  <text x="100" y="150" class="step">Phase 1 - 10%</text>
  <text x="100" y="190" class="desc">Small traffic slice</text>
  <text x="100" y="220" class="desc">Validate error budget</text>
  <text x="100" y="250" class="desc">Observe p95 latency</text>

  <rect x="450" y="100" width="300" height="220" class="box"/>
  <text x="480" y="150" class="step">Phase 2 - 50%</text>
  <text x="480" y="190" class="desc">Progressive confidence</text>
  <text x="480" y="220" class="desc">Load + performance checks</text>
  <text x="480" y="250" class="desc">No critical alerts</text>

  <rect x="830" y="100" width="300" height="220" class="box"/>
  <text x="860" y="150" class="step">Phase 3 - 100%</text>
  <text x="860" y="190" class="desc">Full promotion</text>
  <text x="860" y="220" class="desc">Post-rollout monitoring</text>
  <text x="860" y="250" class="desc">Rollback ready</text>

  <line x1="370" y1="210" x2="440" y2="210" class="arrow"/>
  <line x1="750" y1="210" x2="820" y2="210" class="arrow"/>
</svg>
