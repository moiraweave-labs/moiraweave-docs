site_name: MoiraWeave Docs
site_description: Public documentation for the MoiraWeave MLOps platform
site_url: https://moiraweave-labs.github.io/
repo_name: moiraweave-docs
repo_url: https://github.com/moiraweave-labs/moiraweave-docs

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      lang: en

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Quickstart: quickstart.md
  - Repository Structure: repo-structure.md
  - Adding a Step: adding-a-step.md
  - Adding a Pipeline: adding-a-pipeline.md
  - Architecture Benchmark: architecture-benchmark.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - meta
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
