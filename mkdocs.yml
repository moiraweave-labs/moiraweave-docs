site_name: MoiraWeave Docs
site_description: Public documentation for the MoiraWeave MLOps platform
site_url: https://moiraweave-labs.github.io/
repo_name: moiraweave-docs
repo_url: https://github.com/moiraweave-labs/moiraweave-docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Quickstart: quickstart.md
  - Repository Structure: repo-structure.md
  - Adding a Step: adding-a-step.md
  - Adding a Pipeline: adding-a-pipeline.md
  - Architecture Benchmark: architecture-benchmark.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
